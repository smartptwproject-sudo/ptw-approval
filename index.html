<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>Smart Permit to Work - Decision</title>
  <style>
    :root {
      --primary-dark: #0A1929; /* لون الخلفية العلوي من تصميم MAUI */
      --btn-green: #4CAF50;
      --btn-red: #E57373;
      --btn-navy: #001F54;
      --txt-gray: #6C757D;
      --input-bg: #FFFFFF;
      --lbl-color: #333333;
    }
    body { font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif; background-color: #FFFFFF; direction: ltr; padding: 0; margin: 0; overflow-x: hidden; }
    
    /* الجزء العلوي - الهيدر (الأزرق الداكن) */
    .header { background-color: var(--primary-dark); color: white; padding: 30px 20px; text-align: center; display: flex; flex-direction: column; align-items: center; justify-content: center; position: relative; }
    .back-icon { position: absolute; left: 20px; top: 25px; color: white; font-size: 24px; text-decoration: none; }
    .close-icon { position: absolute; right: 20px; top: 25px; color: white; font-size: 24px; text-decoration: none; }
    
    .header h2 { margin: 10px 0 5px 0; font-size: 20px; font-weight: normal; }
    .sub-title { font-size: 16px; color: #CCCCCC; margin: 0; }
    .details-text { font-size: 14px; color: #FFFFFF; font-weight: normal; margin: 15px 0 5px 0; line-height: 1.4; }

    /* الجزء السفلي - الحاوية البيضاء (The Card) */
    .card-container { background-color: #FFFFFF; border-top-left-radius: 30px; border-top-right-radius: 30px; margin-top: -30px; padding: 30px 20px; min-height: 50vh; box-shadow: 0 -10px 20px rgba(0,0,0,0.1); position: relative; z-index: 10; }
    
    .form-group { margin-bottom: 25px; width: 100%; box-sizing: border-box; }
    
    /* تنسيق رقم التصريح (Permit ID) */
    .id-display { background-color: #F0F2F5; border-radius: 12px; padding: 20px; text-align: center; border: 1px solid #ddd; display: flex; align-items: center; justify-content: center; width: 100%; box-sizing: border-box;}
    .id-label { font-size: 16px; color: var(--txt-gray); }
    .id-value { font-size: 16px; color: #000; font-weight: bold; margin-left: 10px; }

    /* تنسيق ملاحظات المدير (Manager Comment) */
    .comment-label { font-size: 16px; font-weight: bold; color: var(--lbl-color); display: block; margin-bottom: 12px; text-align: left; }
    textarea { width: 100%; padding: 15px; border-radius: 10px; border: 1px solid #ced4da; box-sizing: border-box; resize: none; min-height: 120px; font-size: 14px; background-color: var(--input-bg); }
    textarea::placeholder { color: #A0A0A0; text-align: left; /* للمحاذاة كما في MAUI */ }

    /* تنسيق أزرار القرار (Approve / Reject) */
    .decision-container { display: flex; gap: 15px; width: 100%; }
    .decision-btn { flex: 1; text-align: center; border-radius: 10px; padding: 18px 10px; color: white; font-size: 16px; font-weight: bold; cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 8px; transition: 0.2s; box-sizing: border-box;}
    .btn-icon { width: 20px; height: 20px; }
    
    .approve-btn { background-color: #C8E6C9; color: #33691E; border: 2px solid var(--btn-green); }
    .approve-btn.active { background-color: var(--btn-green); color: white; border: 2px solid var(--btn-green); }
    
    .reject-btn { background-color: #FFCDD2; color: #B71C1C; border: 2px solid var(--btn-red); }
    .reject-btn.active { background-color: var(--btn-red); color: white; border: 2px solid var(--btn-red); }

    /* تنسيق زر الإرسال النهائي (Submit) */
    .submit-btn { width: 100%; background-color: var(--btn-navy); color: white; padding: 18px; border: none; border-radius: 10px; font-size: 18px; font-weight: bold; cursor: pointer; margin-top: 15px; box-sizing: border-box; }
    .submit-btn:disabled { background-color: var(--txt-gray); cursor: not-allowed;}

  </style>
</head>
<body>

  <div class="main-layout" id="formCard">
    <!-- الجزء العلوي - الهيدر (MAUI Top-section) -->
    <div class="header">
      <a href="#" class="back-icon">&#10094;</a>
      <a href="#" class="close-icon">&#10005;</a>
      <h2>Permit to Work</h2>
      <p class="sub-title">(Smart Permit to Work)</p>
      <p class="details-text">Current Work Permit Details:<br>Please review and select your final decision below.</p>
    </div>

    <!-- الجزء السفلي - فورم اتخاذ القرار (MAUI Form-section) -->
    <div class="card-container">
      
      <!-- عرض رقم التصريح (يتلقى البيانات من URL) -->
      <div class="form-group">
        <div class="id-display">
          <span class="id-label">Permit ID:</span>
          <span class="id-value" id="lblPermitNo">Loading...</span>
        </div>
      </div>

      <!-- ملاحظات المدير -->
      <div class="form-group">
        <label class="comment-label">Manager Comment *</label>
        <textarea id="comment" placeholder="Type your comments or rejection reasons here..."></textarea>
      </div>

      <!-- أزرار اتخاذ القرار (Approve / Reject) -->
      <div class="form-group decision-container">
        <button class="decision-btn approve-btn" onclick="selectDecision('Approved')" id="btnApprove">
          <img src="https://img.icons8.com/material-rounded/24/33691E/checked--v1.png" class="btn-icon" id="iconApprove">
          Approve
        </button>
        <button class="decision-btn reject-btn" onclick="selectDecision('Rejected')" id="btnReject">
          <img src="https://img.icons8.com/material-outlined/24/B71C1C/multiply.png" class="btn-icon" id="iconReject">
          Reject
        </button>
      </div>

      <!-- زر الإرسال النهائي -->
      <button class="submit-btn" id="submitBtn" onclick="submitData()">Submit Final Decision</button>
    </div>
  </div>

  <script>
    // 1. قراءة البيانات من الـ URL القادم من الأبلكيشن
    var urlParams = new URLSearchParams(window.location.search);
    var permitNo = urlParams.get('permitNo'); // هذا هو رقم التصريح الذي سيتم سحبه تلقائيًا
    var selectedDecision = null;

    //عرض البيانات فور فتح الصفحة
    window.onload = function() {
      if (!permitNo) {
        document.getElementById("formCard").innerHTML = 
          "<div style='text-align:center; padding:50px; color:#dc3545;'>" +
          "<h2>⚠️ Error: Link Invalid</h2><p>The Permit ID is missing.</p></div>";
        return;
      }
      document.getElementById("lblPermitNo").innerText = permitNo;
    };

    // دالة اختيار القرار وتغيير مظهر الأزرار (Approve/Reject)
    function selectDecision(decision) {
      selectedDecision = decision;
      var btnApprove = document.getElementById("btnApprove");
      var btnReject = document.getElementById("btnReject");
      var iconApprove = document.getElementById("iconApprove");
      var iconReject = document.getElementById("iconReject");

      if (decision === 'Approved') {
        btnApprove.classList.add('active');
        btnReject.classList.remove('active');
        // تغيير لون الأيقونات لتكون بيضاء عند التفعيل
        iconApprove.src = "https://img.icons8.com/material-rounded/24/FFFFFF/checked--v1.png";
        iconReject.src = "https://img.icons8.com/material-outlined/24/B71C1C/multiply.png"; // العودة للون الأصلي
      } else {
        btnReject.classList.add('active');
        btnApprove.classList.remove('active');
        iconApprove.src = "https://img.icons8.com/material-rounded/24/33691E/checked--v1.png"; // العودة للون الأصلي
        iconReject.src = "https://img.icons8.com/material-outlined/24/FFFFFF/multiply.png"; // تغيير لون الأيقونات لتكون بيضاء عند التفعيل
      }
    }

    function submitData() {
      var comment = document.getElementById("comment").value;
      
      if (!comment || !selectedDecision) {
        alert("Please type your comments and select your decision first.");
        return;
      }
      
      // تغيير واجهة المستخدم لإظهار حالة التحميل
      document.getElementById("formCard").innerHTML = 
          "<div style='text-align:center; padding: 50px 20px;'> " +
          "<h2 style='color:var(--primary-dark);'>✓ Processing your decision...</h2>" +
          "<p style='font-weight:normal; color:var(--txt-gray);'>Saving to the database.</p>" +
          "</div>";

      // 2. تحديث الفايربيز مباشرة عن طريق الـ REST API وبدون أي وسيط خارجي!
      // (ملاحظة: تأكد من أن قواعد بيانات Firebase لديك تسمح بالكتابة)
      var firebaseUrl = "https://smart-ptw-system-default-rtdb.firebaseio.com/Permits/" + permitNo + ".json";
      
      var payload = {
        "Status": selectedDecision,
        "ManagerComment": comment,
        "ActionDate": new Date().toISOString()
      };

      fetch(firebaseUrl, {
        method: 'PATCH', // استخدام PATCH لتحديث الحقول المحددة فقط
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(payload)
      })
      .then(function(response) {
        if(response.ok) {
          document.getElementById("formCard").innerHTML = 
            "<div style='text-align:center; padding: 50px 20px;'> " +
            "<h2 style='color:#28a745;'>✓ Decision Submitted Successfully</h2>" +
            "<p style='font-weight:normal; color:var(--txt-gray);'>Permit #" + permitNo + " has been updated.</p>" +
            "</div>";
        } else {
          document.getElementById("formCard").innerHTML = 
            "<div style='text-align:center; padding: 50px 20px;'> " +
            "<h2 style='color:#dc3545;'>❌ Submission Failed</h2>" +
            "<p style='font-weight:normal; color:var(--txt-gray);'>There was an error saving your decision. Please try again later.</p>" +
            "</div>";
        }
      })
      .catch(function(error) {
         document.getElementById("formCard").innerHTML = 
            "<div style='text-align:center; padding: 50px 20px;'> " +
            "<h2 style='color:#dc3545;'>❌ Connection Error</h2>" +
            "<p style='font-weight:normal; color:var(--txt-gray);'>Could not connect to the database.</p>" +
            "</div>";
      });
    }
  </script>
</body>
</html>
